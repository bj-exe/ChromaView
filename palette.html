<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Generated Palette</title>
  <link rel="stylesheet" href="palette.css">
</head>
<body>
  <nav class="navbar">
    <button id="blindnessBtn">Color Blindness</button>
    <button id="copyPalette">Copy HEX Codes</button>
    <button id="regenPalette">Generate Again</button>
    <button id="savePalette">Save Palette</button>
    <button class="icon-btn" onclick="window.location.href='index.html'">&#x2190;</button>
  </nav>

  <div class="container">
    <h1>Your Color Palette</h1>
    <p class="page-note">The first swatch stays as your base color. Lock any other swatch, then generate again to refresh only the unlocked ones.</p>

    <div id="paletteDisplay" class="palette"></div>

    <div id="blindnessPanel">
      <select id="blindnessType">
        <option value="protanopia">Protanopia</option>
        <option value="deuteranopia">Deuteranopia</option>
        <option value="tritanopia">Tritanopia</option>
        <option value="achromatopsia">Achromatopsia</option>
      </select>
      <button id="applyBlindness">Apply</button>
      <button id="cancelBlindness">Cancel</button>
    </div>

    <h2>Comparison</h2>
    <div id="comparisonDisplay" class="palette comparison-palette"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro/dist/iro.min.js"></script>
  <script src="palette.js"></script>
</body>
</html>
