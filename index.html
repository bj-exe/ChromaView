<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro/dist/iro.min.js"></script>
</head>
<body>
  <div class="container">
    <h1 id="tagline">Color Palette Generator</h1>

    <div class="picker-area">
       <div class="picker-column">
        <div id="color-picker"></div>

        <div class="image-picker-section">
          <label class="manual-label" for="imageUpload"><strong>Pick a color from an image</strong></label>
          <input type="file" id="imageUpload" accept="image/*">
          <p class="image-help">Upload an image, then click anywhere on it to use that color.</p>
          <div id="imagePickerEmpty">No image selected yet.</div>
          <canvas id="imageCanvas" hidden></canvas>
        </div>
      </div>

      <div class="values-area">
        <div id="values"></div>

        <h3>Shades</h3>
        <div id="palette"></div>

        <label for="colorCount"><strong>How many colors?</strong></label>
        <input type="number" id="colorCount" min="2" max="10" value="5">

        <label class="manual-label" for="manualBaseColor"><strong>Or enter a color manually</strong></label>
        <div id="manualColorWrapper">
          <input type="text" id="manualBaseColor" placeholder="#ff0000 or rgb(255,0,0)">
          <button id="applyManualColor">Apply</button>
        </div>

        <button id="generateBtn">Generate Color Palette</button>
      </div>
    </div>

    <h2>Saved Palettes</h2>
    <div id="savedPalettes"></div>

    <h2>Contrast Checker</h2>

    <div id="contrastControls">
      <div class="control-row">
        <label for="manualColor"><strong>Enter a color</strong></label>
        <input type="text" id="manualColor" placeholder="#ff0000 or rgb(255,0,0)">
        <button id="addColorBtn">Add Color</button>
        <button id="refreshBtn">Refresh</button>
      </div>

      <div class="control-row">
        <label for="paletteSelect"><strong>Use Saved Palette</strong></label>
        <select id="paletteSelect"></select>
        <button id="usePaletteBtn">Use Palette</button>
      </div>
    </div>

    <div id="manualColors"></div>
    <div id="contrastResults"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
